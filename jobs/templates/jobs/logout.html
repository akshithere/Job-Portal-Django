{% extends 'jobs/base.html' %}

{% block title %}Logout - Job Portal{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-5 mx-auto">
        <div class="card shadow">
            <div class="card-header bg-warning text-dark text-center">
                <h3 class="mb-0">
                    <i class="fas fa-sign-out-alt me-2"></i>Logout Confirmation
                </h3>
            </div>
            <div class="card-body p-4 text-center">
                <i class="fas fa-exclamation-circle fa-4x text-warning mb-4"></i>
                <h5 class="mb-3">Are you sure you want to logout?</h5>
                <p class="text-muted mb-4">You will need to login again to access your account.</p>

                <form method="post" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-warning btn-lg me-2">
                        <i class="fas fa-sign-out-alt me-2"></i>Yes, Logout
                    </button>
                    <a href="{% url 'home' %}" class="btn btn-secondary btn-lg">
                        <i class="fas fa-times me-2"></i>Cancel
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
