{% extends 'jobs/base.html' %}

{% block title %}Delete Job - Job Portal{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-6 mx-auto">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h3 class="mb-0">
                    <i class="fas fa-exclamation-triangle me-2"></i>Delete Job
                </h3>
            </div>
            <div class="card-body">
                <h5 class="card-title">{{ job.title }}</h5>
                <h6 class="text-muted">{{ job.company }}</h6>
                <p class="card-text mt-3">
                    Are you sure you want to delete this job posting? This action cannot be undone.
                </p>
                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger btn-lg">
                            <i class="fas fa-trash me-2"></i>Yes, Delete Job
                        </button>
                        <a href="{% url 'my_jobs' %}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
